<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-slate-200">
  <h1 class="text-2xl font-semibold text-slate-800 mb-6 tracking-tight">Controle de Peso</h1>

  <!-- Área de Registro -->
  <div class="flex gap-3 mb-8">
    <input 
      type="number" 
      [(ngModel)]="novoPeso" 
      placeholder="Digite o peso (ex: 91.75)" 
      class="flex-1 border border-slate-300 rounded-md px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all"
    />
    <button 
      (click)="salvarPeso()" 
      class="bg-blue-600 text-white px-5 py-2 rounded-md hover:bg-blue-700 font-medium transition-colors"
    >
      Registrar
    </button>
  </div>

  <!-- Histórico -->
  <h2 class="text-lg font-medium text-slate-700 mb-4">Histórico Recente</h2>
  
  <div class="bg-slate-50 rounded-md border border-slate-200">
    <ul class="divide-y divide-slate-200">
      <li *ngFor="let p of pesagens" class="flex justify-between items-center px-4 py-3 group hover:bg-slate-100 transition-colors">
        <!-- Informações da pesagem -->
        <div class="flex flex-col">
          <span class="font-semibold text-slate-800">{{ p.peso }} kg</span>
          <span class="text-slate-500 text-xs">{{ p.data | date:'dd/MM/yyyy' }}</span>
        </div>
        
        <!-- Botão de exclusão -->
        <button 
          (click)="deletarPeso(p.id)" 
          class="text-slate-400 hover:text-red-600 transition-colors px-2 py-1"
          title="Excluir registro"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </li>
    </ul>
  </div>
</div>
