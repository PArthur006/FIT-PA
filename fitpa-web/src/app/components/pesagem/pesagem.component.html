<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-md border border-slate-200">
  <h1 class="text-2xl font-semibold text-slate-800 mb-6 tracking-tight">Controle de Peso</h1>

  <!--
    Área de registro e edição
    Reúne o campo de data, o campo de peso e os botões de ação.
  -->
  <div class="flex flex-col sm:flex-row gap-3 mb-8 items-start">
    <input
      type="date"
      [max]="dataMaxima"
      [(ngModel)]="dataSelecionada"
      class="border border-slate-300 rounded-md px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all w-full sm:w-auto"
    />
    <input
      type="number"
      [(ngModel)]="novoPeso"
      placeholder="Peso (ex: 91.75)"
      class="flex-1 border border-slate-300 rounded-md px-4 py-2 text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all w-full"
    />

    <div class="flex gap-2 w-full sm:w-auto">
      <button
        (click)="salvarPeso()"
        [ngClass]="
          pesagemEmEdicao ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'
        "
        class="text-white px-5 py-2 rounded-md font-medium transition-colors w-full whitespace-nowrap"
      >
        {{ pesagemEmEdicao ? 'Atualizar' : 'Registrar' }}
      </button>

      <button
        *ngIf="pesagemEmEdicao"
        (click)="cancelarEdicao()"
        class="bg-slate-200 text-slate-700 px-3 py-2 rounded-md hover:bg-slate-300 font-medium transition-colors"
        title="Cancelar edição"
      >
        ✕
      </button>
    </div>
  </div>

  <!--
    Histórico de pesagens
    Lista os registros salvos com data e peso.
  -->
  <h2 class="text-lg font-medium text-slate-700 mb-4">Histórico Recente</h2>

  <div class="bg-slate-50 rounded-md border border-slate-200">
    <ul class="divide-y divide-slate-200">
      <li
        *ngFor="let p of pesagens"
        class="flex justify-between items-center px-4 py-3 group hover:bg-slate-100 transition-colors"
      >
        <!-- Dados do registro -->
        <div class="flex flex-col">
          <span class="font-semibold text-slate-800">{{ p.peso }} kg</span>
          <span class="text-slate-500 text-xs">{{ p.data | date: 'dd/MM/yyyy' }}</span>
        </div>

        <!--
          Ações do registro
          Permite editar ou excluir a pesagem selecionada.
        -->
        <div class="flex gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
          <button
            (click)="editarPeso(p)"
            class="text-slate-400 hover:text-amber-500 transition-colors p-1"
            title="Editar registro"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
              />
            </svg>
          </button>

          <button
            (click)="deletarPeso(p.id)"
            class="text-slate-400 hover:text-red-600 transition-colors p-1"
            title="Excluir registro"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          </button>
        </div>
      </li>

      <li *ngIf="pesagens.length === 0" class="px-4 py-4 text-center text-slate-500 text-sm">
        Nenhum peso registrado ainda.
      </li>
    </ul>
  </div>
</div>
